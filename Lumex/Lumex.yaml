# Lumex Party 专用配置文件 (由 Lumex.js 转换而来)
# 引用链接: https://raw.githubusercontent.com/int-del/LumexOverwrite/main/Lumex.yaml
# 加速链接: https://cdn.jsdelivr.net/gh/int-del/LumexOverwrite@main/Lumex.yaml
# 版本: v2.12 | 更新日期: 2026-03-08
# 说明: 
# 1. 本文件为完整的 YAML 配置，可直接作为 Lumex Party 的【配置(Profile)】导入使用。
# 2. 相比 JS 覆写脚本，YAML 格式解析更快，且原生支持。
# 3. 节点指纹 (client-fingerprint) 和 UDP 开启已通过 proxy-providers 的 override 字段实现。
# 4. 新增 expected-status 特性，要求 Lumex v1.18+ 内核以防止节点假连通。

log-level: info
tcp-concurrent: true
unified-delay: true
global-ua: chrome
keep-alive-idle: 15
keep-alive-interval: 15
allow-lan: true
bind-address: '*'
find-process-mode: strict
profile:
  store-selected: true
  store-fake-ip: true
skip-auth-prefixes:
  - 127.0.0.1/8
  - '::1/128'
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
dns:
  enable: true
  ipv6: false
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.ntp.org
    - +.pool.ntp.org
    - +.stun.protocol.org
    - stun.*
    - +.stun.*.*
    - +.stun.*
    - +.nintendo.net
    - +.playstation.net
    - +.xboxlive.com
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time1.cloud.tencent.com
    - '*.bambulab.com'
    - '*.bambulab.cn'
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  nameserver-policy:
    geosite:category-ads-all: rcode://success
    geosite:geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
    geosite:cn: https://dns.alidns.com/dns-query
    geosite:apple: https://dns.alidns.com/dns-query
    +.icloud.com: https://dns.alidns.com/dns-query
    +.icloud-content.com: https://dns.alidns.com/dns-query
    +.mzstatic.com: https://dns.alidns.com/dns-query
    +.apple.com: https://dns.alidns.com/dns-query
    +.bambulab.cn: https://doh.pub/dns-query
    +.bambulab.com: https://doh.pub/dns-query
    +.bilibili.com: https://doh.pub/dns-query
    +.qq.com: https://doh.pub/dns-query
    +.taobao.com: https://dns.alidns.com/dns-query
    +.aliyun.com: https://dns.alidns.com/dns-query
tun:
  enable: true
  stack: mixed
  mtu: 9000
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: true
  dns-hijack:
    - any:53
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080
        - 8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - +.apple.com
    - Mijia Cloud
    - +.qq.com
    - +.music.tc.qq.com
    - +.aliyuncs.com
    - '*.lan'
    - '*.local'
rule-providers: {}
proxy-providers:
  组合机场:
    type: http
    url: https://sub.tymin.cn:8443/xiejian2026/download/collection/%E7%BB%84%E5%90%88%E6%9C%BA%E5%9C%BA
    path: ./proxy_providers/组合机场.yaml
    interval: 3600
    filter: (?i)^(?!.*(流量|到期|重置|官网|剩余|套餐|expire|traffic|reset|群组|频道|@|联系|网站|入群|关注|反馈|更新)).*
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 240
      expected-status: '204' # 🚀 依赖 Lumex 1.18+ 内核功能：防止流量耗尽/被墙的情况导致假连通
    override:
      client-fingerprint: chrome
      udp: true
proxy-groups:
  - name: 自动选择
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Urltest.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(IEPL|俄罗斯|Russia|RU|朝鲜|Korea|KP|古巴|Cuba|CU)).*
    url: https://www.gstatic.com/generate_204
    expected-status: '204' # 🚀 依赖 Lumex 1.18+ 内核功能：防止劣质/被封节点强行返回 403/302 导致测速被骗
    interval: 120
    tolerance: 100
    lazy: false
  - name: EMBY
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Emby.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(IEPL|俄罗斯|Russia|RU|朝鲜|Korea|KP|古巴|Cuba|CU|日本|Japan|JP)).*
    url: https://www.gstatic.com/generate_204
    expected-status: '204'
    interval: 360
    tolerance: 100
    lazy: true
  - name: Gemini
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Google.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(俄罗斯|香港|HongKong|HK|Russia|RU|澳门|Macau|MO|立陶宛|Lithuania|LT|朝鲜|Korea|KP|KR|韩国|古巴|Cuba|CU|CN|China|中国|日本|Japan|JP)).*
    url: https://gemini.google.com
    expected-status: '200/301/302/307/308' # 🎯 Lumex专用语法(不能用正则): 用斜杠分隔或使用A-B格式，允许200和30x，严格拦截被送中(403/404)或被拦截的节点
    interval: 420
    tolerance: 100
    lazy: true
  - name: Copilot
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Microsoft.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(俄罗斯|Russia|RU|朝鲜|Korea|KP|古巴|Cuba|CU)).*
    url: https://www.bing.com
    expected-status: '200/301/302/307/308'
    interval: 480
    tolerance: 100
    lazy: true
  - name: GitHub Copilot
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/github.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(俄罗斯|Russia|RU|朝鲜|Korea|KP|古巴|Cuba|CU)).*
    url: https://api.github.com
    expected-status: '200/301/302/307/308'
    interval: 540
    tolerance: 100
    lazy: true
  - name: ChatGPT
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/OpenAI.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(香港|HongKong|HK|俄罗斯|Russia|RU|澳门|Macau|朝鲜|Korea|KP|古巴|Cuba|CU)).*
    url: https://chatgpt.com
    expected-status: '200/301/302/307/308'
    interval: 600
    tolerance: 100
    lazy: true
  - name: Telegram
    type: url-test
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Telegram.png
    include-all: true
    use:
      - 组合机场
    filter: ^(?!.*(俄罗斯|Russia|RU)).*
    url: https://api.telegram.org
    expected-status: '200/301/302/307/308'
    interval: 620
    tolerance: 100
    lazy: true
  - name: 国内
    type: select
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/CN.png
    proxies:
      - DIRECT
      - 自动选择
  - name: Google
    type: select
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Google.png
    proxies:
      - Gemini
      - 自动选择
  - name: YouTube
    type: select
    icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/YouTube.png
    proxies:
      - 自动选择
      - Gemini
rules:
  # ==========================================
  # 🔴 层级 1：最高优先级 - 本地与局域网 IP 直连
  # 作用: 防止局域网设备(NAS/打印机)和网关流量被代理劫持，会导致断网
  # ==========================================
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR,255.255.255.255/32,DIRECT,no-resolve
  - GEOIP,PRIVATE,DIRECT,no-resolve
  
  # ==========================================
  # 🟠 层级 2：绝对特权区 - 专有业务与内网域名强制分流
  # 作用: 抢在泛匹配之前，确保特定的 Emby 服绝对走高优代理或者指定的直连通道
  # ==========================================
  # 🎬 Emby 影音代理服务器分流 (要求剔除去日本)
  - DOMAIN,tv.ash.yt,EMBY # AshEmby
  - DOMAIN,ask.ash.yt,EMBY # Ask Ash
  - DOMAIN,best.28.al,EMBY # 起点:公费A
  - DOMAIN,emby.bangumi.ca,EMBY # Nyamedia:公益
  - DOMAIN,free.28.al,EMBY # 起点:公益2-30天保号
  - DOMAIN,1.eoos.lol,EMBY # eoos
  - DOMAIN,v1.uhdnow.com,EMBY # UHD
  - DOMAIN,emby-cm.hohai.eu.org,EMBY # honhai:公费
  - DOMAIN,emby-npo.hohai.eu.org,EMBY # hohai:公益
  - DOMAIN,m.mobaiemby.site,EMBY # 墨云阁:公益30天保号
  - DOMAIN,us01.doudou.pet,EMBY # Ryan:公益
  - DOMAIN-SUFFIX,test.startspoint.com,EMBY # 起点公费A
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,home.arpa,DIRECT
  - DOMAIN-SUFFIX,yfjc.xyz,DIRECT
  # EMBY 直连服 (独立拆分)
  - DOMAIN-SUFFIX,xmsl.org,DIRECT  # 1111:公费
  - DOMAIN-SUFFIX,1huanlesap02.top,DIRECT  # 起点:Pro
  
  # ==========================================
  # 🟡 层级 3：系统底层修正与广告协议拦截
  # 作用: 修复 Windows 系统连通性探测、关闭阻断 QUIC 保流媒体、彻底去广告兜底
  # ==========================================
  - DOMAIN,ipv6.msftconnecttest.com,REJECT
  - DOMAIN,ipv6.msftncsi.com,REJECT
  - DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
  - DOMAIN-SUFFIX,msftncsi.com,DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - GEOSITE,category-ads-all,REJECT
  - DOMAIN-SUFFIX,tracking.miui.com,REJECT
  
  # ==========================================
  # 🟢 层级 4：核心核心 AI 服务精准保护
  # 作用: 防止被大厂泛解析接管，这部分全部指定走最精简专门筛掉送中的代理点
  # ==========================================
  - DOMAIN-SUFFIX,gemini.google.com,Gemini
  - DOMAIN-SUFFIX,bard.google.com,Gemini
  - DOMAIN,gemini.google.com,Gemini
  - DOMAIN,bard.google.com,Gemini
  - DOMAIN,generativelanguage.googleapis.com,Gemini
  - DOMAIN-SUFFIX,proactivebackend-pa.googleapis.com,Gemini
  - DOMAIN-SUFFIX,opa-pa.googleapis.com,Gemini
  - DOMAIN-SUFFIX,waa-pa.googleapis.com,Gemini
  - DOMAIN-SUFFIX,client-channel.google.com,Gemini
  - DOMAIN-SUFFIX,assistant.google.com,Gemini
  - DOMAIN-SUFFIX,ai.google.com,Gemini
  - DOMAIN-SUFFIX,aistudio.google.com,Gemini
  - DOMAIN-SUFFIX,makersuite.google.com,Gemini
  - DOMAIN-SUFFIX,googleapis.cn,Gemini
  - DOMAIN-SUFFIX,deepmind.com,Gemini
  - DOMAIN-SUFFIX,deepmind.google,Gemini
  - DOMAIN-SUFFIX,openai.com,ChatGPT
  - DOMAIN-SUFFIX,chatgpt.com,ChatGPT
  - DOMAIN-SUFFIX,oaistatic.com,ChatGPT
  - DOMAIN-SUFFIX,oaiusercontent.com,ChatGPT
  - GEOSITE,openai,ChatGPT
  - DOMAIN,cn.bing.com,DIRECT
  - DOMAIN-SUFFIX,bing.com,Copilot
  - DOMAIN-SUFFIX,copilot.microsoft.com,Copilot
  - GEOSITE,github,GitHub Copilot
  - GEOSITE,google,Google
